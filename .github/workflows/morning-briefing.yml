name: Morning Financial Briefing

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 07:00 CST (UTC+8)
  workflow_dispatch:         # allow manual run for testing

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser

      - name: Generate and send briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}   # optional: leave empty for default
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: jimmy.xu88@icloud.com
        run: python scripts/generate_briefing.py
