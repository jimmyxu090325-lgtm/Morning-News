name: China Tax Intelligence Brief

concurrency:
  group: morning-news-publish
  cancel-in-progress: false

on:
  schedule:
    - cron: '6 23 * * *'  # 23:06 UTC = 07:06 CST (UTC+8)
  workflow_dispatch:         # allow manual run for testing

jobs:
  tax-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic feedparser requests beautifulsoup4

      - name: Generate and send tax briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: jimmy.xu88@icloud.com
        run: python scripts/generate_tax_brief.py

      - name: Save briefing to Obsidian vault
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add "Tax Daily News/"
          git diff --cached --quiet || git commit -m "Add tax brief $(date -u +'%Y-%m-%d')"
          git push
